<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>整合式音樂播放器 - Howler.js Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-green-hover: #1ed760;
            --bg-base: #121212;
            --bg-card: #181818;
            --bg-card-hover: #282828;
            --text-main: #FFFFFF;
            --text-sub: #B3B3B3;
            --progress-bg: #4d4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', "PingFang TC", "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-main);
            padding: 20px;
        }

        .player-container {
            background-color: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            padding: 30px;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 40px;
        }

        .player-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .cover-art {
            width: 100%;
            max-width: 250px;
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .cover-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        #song-title {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 8px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #artist-name {
            font-size: 1em;
            color: var(--text-sub);
            margin-bottom: 24px;
        }

        .progress-wrapper {
            width: 100%;
            margin-bottom: 20px;
        }

        .progress-container {
            background-color: var(--progress-bg);
            height: 6px;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            margin-bottom: 8px;
        }

        .progress-bar {
            background-color: var(--spotify-green);
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.1s linear; /* 讓移動更平滑 */
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: var(--text-sub);
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            width: 100%;
        }

        .control-btn {
            background: transparent;
            color: var(--text-sub);
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-btn:hover { color: var(--text-main); transform: scale(1.1); }

        #play {
            background-color: var(--text-main);
            color: black;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #play:hover { background-color: var(--spotify-green); }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            color: var(--text-sub);
        }

        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
        }

        .playlist-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.1);
            padding-left: 30px;
        }

        #playlist {
            list-style: none;
            overflow-y: auto;
            max-height: 350px;
        }

        #playlist li {
            padding: 10px;
            border-radius: 6px;
            cursor: pointer;
            margin-bottom: 4px;
        }

        #playlist li:hover { background-color: var(--bg-card-hover); }

        #playlist li.active-song { background-color: rgba(29, 185, 84, 0.1); }

        #playlist li.active-song .li-title { color: var(--spotify-green); font-weight: 600; }

        .li-title { display: block; font-size: 0.95em; }
        .li-artist { font-size: 0.8em; color: var(--text-sub); }

        @media (max-width: 768px) {
            .player-container { flex-direction: column; }
            .playlist-section { border-left: none; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 20px; }
        }
    </style>
</head>
<body>
    <div class="player-container">
        <div class="player-section">
            <div class="cover-art">
                <img id="cover" src="images/default_cover.jpg" alt="專輯封面">
            </div>
            <h2 id="song-title">等待載入中...</h2>
            <h3 id="artist-name">--</h3>

            <div class="progress-wrapper">
                <div class="progress-container" id="progress-container">
                    <div id="progress" class="progress-bar"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button id="prev" class="control-btn"><i class="fas fa-step-backward"></i></button>
                <button id="play" class="control-btn"><i class="fas fa-play"></i></button>
                <button id="next" class="control-btn"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="volume-control">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>

        <div class="playlist-section">
            <h3>接下來播放</h3>
            <ul id="playlist"></ul>
        </div>
    </div>

    <script>
        const playBtn = document.getElementById('play');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const songTitle = document.getElementById('song-title');
        const artistName = document.getElementById('artist-name');
        const coverArt = document.getElementById('cover');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress');
        const currentTimeSpan = document.getElementById('current-time');
        const durationSpan = document.getElementById('duration');
        const volumeSlider = document.getElementById('volume-slider');
        const playlistUl = document.getElementById('playlist');

        let songIndex = 0;
        let songs = [];
        let currentHowl = null;
        let animationId = null; // 用於追蹤 requestAnimationFrame

        // 讀取音樂資料
        fetch('music_data.json')
            .then(res => res.json())
            .then(data => {
                songs = data;
                if(songs.length > 0) {
                    loadSong(songIndex, false); // 初始載入不自動播放
                    renderPlaylist();
                }
            })
            .catch(err => {
                songTitle.textContent = "無法載入清單";
                console.error(err);
            });

        // 載入歌曲
        function loadSong(index, shouldPlay = false) {
            const song = songs[index];
            songTitle.textContent = song.title;
            artistName.textContent = song.artist;
            coverArt.src = song.cover;

            // --- 重置進度條 UI ---
            progressBar.style.width = '0%';
            currentTimeSpan.textContent = "0:00";
            durationSpan.textContent = "0:00";

            // 如果之前有歌在播，先停止並卸載舊實例
            if (currentHowl) {
                currentHowl.stop();
                currentHowl.unload();
            }

            // 建立新的 Howl 對象
            currentHowl = new Howl({
                src: [song.src],
                html5: true, 
                volume: volumeSlider.value,
                onload: function() {
                    durationSpan.textContent = formatTime(currentHowl.duration());
                },
                onplay: function() {
                    // 播放開始時，啟動進度更新
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    requestAnimationFrame(updateProgress);
                },
                onpause: function() {
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                },
                onend: function() {
                    nextSong(); // 播放結束自動下一首
                }
            });

            updatePlaylistActiveSong();

            // 如果需要播放（點擊下一首或切換清單時）
            if (shouldPlay) {
                currentHowl.play();
            }
        }

        // 播放與暫停切換
        function togglePlay() {
            if (!currentHowl) return;

            if (currentHowl.playing()) {
                currentHowl.pause();
            } else {
                currentHowl.play();
            }
        }

        // 更新進度條
        function updateProgress() {
            if (currentHowl && currentHowl.playing()) {
                const seek = currentHowl.seek() || 0;
                const duration = currentHowl.duration() || 0;
                
                if (duration > 0) {
                    const progressPercent = (seek / duration) * 100;
                    progressBar.style.width = `${progressPercent}%`;
                    currentTimeSpan.textContent = formatTime(seek);
                }

                // 繼續下一幀更新
                requestAnimationFrame(updateProgress);
            }
        }

        // 切換歌曲邏輯
        function nextSong() {
            songIndex = (songIndex + 1) % songs.length;
            loadSong(songIndex, true); // 傳入 true 確保切換後播放
        }

        function prevSong() {
            songIndex = (songIndex - 1 + songs.length) % songs.length;
            loadSong(songIndex, true); // 傳入 true 確保切換後播放
        }

        // 事件監聽
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextSong);
        prevBtn.addEventListener('click', prevSong);

        // 點擊進度條跳轉
        progressContainer.addEventListener('click', (e) => {
            if (!currentHowl) return;
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = currentHowl.duration();
            
            if (duration > 0) {
                const targetTime = (clickX / width) * duration;
                currentHowl.seek(targetTime);
                
                // 立即更新 UI
                progressBar.style.width = `${(clickX / width) * 100}%`;
                currentTimeSpan.textContent = formatTime(targetTime);
            }
        });

        // 音量控制
        volumeSlider.addEventListener('input', (e) => {
            const vol = e.target.value;
            if (currentHowl) currentHowl.volume(vol);
        });

        // 格式化時間 (00:00)
        function formatTime(secs) {
            if (isNaN(secs)) return "0:00";
            const minutes = Math.floor(secs / 60) || 0;
            const seconds = Math.floor(secs % 60) || 0;
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        // 播放列表渲染
        function renderPlaylist() {
            playlistUl.innerHTML = '';
            songs.forEach((song, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="li-title">${song.title}</span>
                    <span class="li-artist">${song.artist}</span>
                `;
                li.addEventListener('click', () => {
                    songIndex = index;
                    loadSong(songIndex, true); // 點擊清單項目直接播放
                });
                playlistUl.appendChild(li);
            });
            updatePlaylistActiveSong();
        }

        function updatePlaylistActiveSong() {
            const items = playlistUl.querySelectorAll('li');
            items.forEach((item, index) => {
                if (index === songIndex) item.classList.add('active-song');
                else item.classList.remove('active-song');
            });
        }
    </script>
</body>
</html>
