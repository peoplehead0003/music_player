<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>整合式音樂播放器</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-green-hover: #1ed760;
            --bg-base: #121212;
            --bg-card: #181818;
            --bg-card-hover: #282828;
            --text-main: #FFFFFF;
            --text-sub: #B3B3B3;
            --progress-bg: #4d4d4d;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', "PingFang TC", "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-main);
            padding: 20px;
        }

        /* 播放器主體 - 改為窄版單欄 */
        .player-container {
            background-color: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            padding: 30px;
            width: 100%;
            max-width: 400px; /* 縮小寬度使其更精緻 */
            position: relative;
        }

        .player-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .cover-art {
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .cover-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        #song-title {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 8px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #artist-name {
            font-size: 1em;
            color: var(--text-sub);
            margin-bottom: 24px;
        }

        /* 進度條 */
        .progress-wrapper {
            width: 100%;
            margin-bottom: 20px;
        }

        .progress-container {
            background-color: var(--progress-bg);
            height: 6px;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            margin-bottom: 8px;
        }

        .progress-bar {
            background-color: var(--spotify-green);
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: width 0.1s linear;
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: var(--text-sub);
        }

        /* 控制按鈕 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            width: 100%;
        }

        .control-btn {
            background: transparent;
            color: var(--text-sub);
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-btn:hover { color: var(--text-main); transform: scale(1.1); }

        #play {
            background-color: var(--text-main);
            color: black;
            border-radius: 50%;
            width: 55px;
            height: 55px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #play:hover { background-color: var(--spotify-green); }

        .extra-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-top: 10px;
        }

        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-grow: 1;
            margin-right: 15px;
        }

        input[type=range] {
            flex-grow: 1;
            cursor: pointer;
            accent-color: var(--spotify-green);
        }

        /* 浮動播放清單樣式 */
        .playlist-section {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 300px;
            max-height: 450px;
            background-color: #242424;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            z-index: 1000;
            transform: translateY(20px);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .playlist-section.show {
            transform: translateY(0);
            opacity: 1;
            visibility: visible;
        }

        .playlist-header {
            padding: 15px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #playlist {
            list-style: none;
            overflow-y: auto;
            padding: 10px;
        }

        #playlist li {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }

        #playlist li:hover { background-color: var(--bg-card-hover); }

        #playlist li.active-song { background-color: rgba(29, 185, 84, 0.15); }

        #playlist li.active-song .li-title { color: var(--spotify-green); font-weight: 600; }

        .li-title { display: block; font-size: 0.9em; }
        .li-artist { font-size: 0.75em; color: var(--text-sub); }

        /* 手機版調整 */
        @media (max-width: 480px) {
            .playlist-section {
                right: 10px;
                left: 10px;
                width: auto;
                bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <div class="player-container">
        <div class="player-section">
            <div class="cover-art">
                <img id="cover" src="images/default_cover.jpg" alt="專輯封面">
            </div>
            <h2 id="song-title">等待載入中...</h2>
            <p id="artist-name">--</p>

            <div class="progress-wrapper">
                <div class="progress-container" id="progress-container">
                    <div id="progress" class="progress-bar"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button id="prev" class="control-btn"><i class="fas fa-step-backward"></i></button>
                <button id="play" class="control-btn"><i class="fas fa-play"></i></button>
                <button id="next" class="control-btn"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="extra-controls">
                <div class="volume-control">
                    <i class="fas fa-volume-down" style="font-size: 0.8em;"></i>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.8">
                </div>
                <button id="playlist-toggle" class="control-btn"><i class="fas fa-list-ul"></i></button>
            </div>
        </div>
    </div>

    <div class="playlist-section" id="playlist-window">
        <div class="playlist-header">
            <span style="font-weight: 600;">播放清單</span>
            <button id="close-playlist" class="control-btn" style="font-size: 1em;"><i class="fas fa-times"></i></button>
        </div>
        <ul id="playlist"></ul>
    </div>

    <script>
        const playBtn = document.getElementById('play');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const songTitle = document.getElementById('song-title');
        const artistName = document.getElementById('artist-name');
        const coverArt = document.getElementById('cover');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress');
        const currentTimeSpan = document.getElementById('current-time');
        const durationSpan = document.getElementById('duration');
        const volumeSlider = document.getElementById('volume-slider');
        const playlistUl = document.getElementById('playlist');
        
        // 清單浮動視窗控制
        const playlistWindow = document.getElementById('playlist-window');
        const playlistToggle = document.getElementById('playlist-toggle');
        const closePlaylist = document.getElementById('close-playlist');

        let songIndex = 0;
        let songs = [];
        let currentHowl = null;

        // 切換清單顯示
        playlistToggle.addEventListener('click', () => {
            playlistWindow.classList.toggle('show');
        });

        closePlaylist.addEventListener('click', () => {
            playlistWindow.classList.remove('show');
        });

        // 讀取音樂資料
        fetch('music_data.json')
            .then(res => res.json())
            .then(data => {
                songs = data;
                if(songs.length > 0) {
                    loadSong(songIndex, false);
                    renderPlaylist();
                }
            })
            .catch(err => {
                songTitle.textContent = "無法載入清單";
                console.error(err);
            });

        function loadSong(index, shouldPlay = false) {
            const song = songs[index];
            songTitle.textContent = song.title;
            artistName.textContent = song.artist;
            coverArt.src = song.cover;

            progressBar.style.width = '0%';
            currentTimeSpan.textContent = "0:00";

            if (currentHowl) {
                currentHowl.stop();
                currentHowl.unload();
            }

            currentHowl = new Howl({
                src: [song.src],
                html5: true, 
                volume: volumeSlider.value,
                onload: function() {
                    durationSpan.textContent = formatTime(currentHowl.duration());
                },
                onplay: function() {
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    requestAnimationFrame(updateProgress);
                },
                onpause: function() {
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                },
                onend: function() {
                    nextSong();
                }
            });

            updatePlaylistActiveSong();
            if (shouldPlay) currentHowl.play();
        }

        function togglePlay() {
            if (!currentHowl) return;
            currentHowl.playing() ? currentHowl.pause() : currentHowl.play();
        }

        function updateProgress() {
            if (currentHowl && currentHowl.playing()) {
                const seek = currentHowl.seek() || 0;
                const duration = currentHowl.duration() || 0;
                if (duration > 0) {
                    progressBar.style.width = `${(seek / duration) * 100}%`;
                    currentTimeSpan.textContent = formatTime(seek);
                }
                requestAnimationFrame(updateProgress);
            }
        }

        function nextSong() {
            songIndex = (songIndex + 1) % songs.length;
            loadSong(songIndex, true);
        }

        function prevSong() {
            songIndex = (songIndex - 1 + songs.length) % songs.length;
            loadSong(songIndex, true);
        }

        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextSong);
        prevBtn.addEventListener('click', prevSong);

        progressContainer.addEventListener('click', (e) => {
            if (!currentHowl) return;
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = currentHowl.duration();
            if (duration > 0) {
                const targetTime = (clickX / width) * duration;
                currentHowl.seek(targetTime);
            }
        });

        volumeSlider.addEventListener('input', (e) => {
            if (currentHowl) currentHowl.volume(e.target.value);
        });

        function formatTime(secs) {
            if (isNaN(secs)) return "0:00";
            const minutes = Math.floor(secs / 60) || 0;
            const seconds = Math.floor(secs % 60) || 0;
            return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        }

        function renderPlaylist() {
            playlistUl.innerHTML = '';
            songs.forEach((song, index) => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span class="li-title">${song.title}</span>
                    <span class="li-artist">${song.artist}</span>
                `;
                li.addEventListener('click', () => {
                    songIndex = index;
                    loadSong(songIndex, true);
                });
                playlistUl.appendChild(li);
            });
            updatePlaylistActiveSong();
        }

        function updatePlaylistActiveSong() {
            const items = playlistUl.querySelectorAll('li');
            items.forEach((item, index) => {
                index === songIndex ? item.classList.add('active-song') : item.classList.remove('active-song');
            });
        }
    </script>
</body>
</html>
