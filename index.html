<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>整合式音樂播放器 - Spotify Style</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --spotify-green: #1DB954;
            --spotify-green-hover: #1ed760;
            --bg-base: #121212;
            --bg-card: #181818;
            --bg-card-hover: #282828;
            --text-main: #FFFFFF;
            --text-sub: #B3B3B3;
            --progress-bg: #4d4d4d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', "PingFang TC", "Helvetica Neue", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-base);
            color: var(--text-main);
            padding: 20px;
        }

        /* 播放器主容器：使用 Flexbox 實現 RWD */
        .player-container {
            background-color: var(--bg-card);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
            padding: 30px;
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 40px;
        }

        /* 左側：播放控制區 */
        .player-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .cover-art {
            width: 100%;
            max-width: 250px;
            aspect-ratio: 1 / 1;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
        }

        .cover-art img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .cover-art:hover img {
            transform: scale(1.02);
        }

        #song-title {
            font-size: 1.4em;
            font-weight: 700;
            margin-bottom: 8px;
            width: 100%;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #artist-name {
            font-size: 1em;
            color: var(--text-sub);
            font-weight: 400;
            margin-bottom: 24px;
        }

        /* 進度條與時間 */
        .progress-wrapper {
            width: 100%;
            margin-bottom: 20px;
        }

        .progress-container {
            background-color: var(--progress-bg);
            height: 6px;
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            margin-bottom: 8px;
            overflow: hidden;
        }

        .progress-bar {
            background-color: var(--text-main);
            height: 100%;
            width: 0%;
            border-radius: 3px;
            transition: background-color 0.2s;
        }

        .progress-container:hover .progress-bar {
            background-color: var(--spotify-green);
        }

        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8em;
            color: var(--text-sub);
        }

        /* 控制按鈕 */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 24px;
            width: 100%;
        }

        .control-btn {
            background: transparent;
            color: var(--text-sub);
            border: none;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .control-btn:hover {
            color: var(--text-main);
            transform: scale(1.1);
        }

        /* 獨立的播放按鈕樣式 (Spotify 經典綠底黑字) */
        #play {
            background-color: var(--text-main);
            color: black;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2em;
        }

        #play:hover {
            background-color: var(--spotify-green);
            transform: scale(1.05);
        }

        /* 音量控制 */
        .volume-control {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            color: var(--text-sub);
        }

        .volume-control i {
            font-size: 0.9em;
        }

        /* 自訂 input range 樣式 */
        input[type=range] {
            -webkit-appearance: none;
            width: 60%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            background: var(--progress-bg);
            border-radius: 2px;
            cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            height: 12px;
            width: 12px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            -webkit-appearance: none;
            margin-top: -4px;
            display: none; /* 預設隱藏，滑鼠移入才顯示 */
        }
        input[type=range]:hover::-webkit-slider-thumb {
            display: block;
        }
        input[type=range]:hover::-webkit-slider-runnable-track {
            background: var(--spotify-green);
        }

        /* 右側：播放列表 */
        .playlist-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-left: 1px solid rgba(255,255,255,0.1);
            padding-left: 30px;
        }

        .playlist-section h3 {
            font-size: 1em;
            color: var(--text-main);
            margin-bottom: 16px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        #playlist {
            list-style: none;
            overflow-y: auto;
            flex-grow: 1;
            max-height: 350px;
            padding-right: 5px;
        }

        /* 美化捲軸 */
        #playlist::-webkit-scrollbar {
            width: 6px;
        }
        #playlist::-webkit-scrollbar-track {
            background: transparent;
        }
        #playlist::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 3px;
        }
        #playlist::-webkit-scrollbar-thumb:hover {
            background: #777;
        }

        #playlist li {
            display: flex;
            flex-direction: column;
            padding: 10px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s ease;
            margin-bottom: 4px;
        }

        #playlist li .li-title {
            font-size: 0.95em;
            color: var(--text-main);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        #playlist li .li-artist {
            font-size: 0.8em;
            color: var(--text-sub);
        }

        #playlist li:hover {
            background-color: var(--bg-card-hover);
        }

        #playlist li.active-song {
            background-color: rgba(29, 185, 84, 0.1);
        }

        #playlist li.active-song .li-title {
            color: var(--spotify-green);
            font-weight: 600;
        }

        /* RWD 響應式設計：小於 768px 時改為直向排列 */
        @media (max-width: 768px) {
            .player-container {
                flex-direction: column;
                gap: 20px;
                padding: 20px;
            }
            .playlist-section {
                border-left: none;
                padding-left: 0;
                border-top: 1px solid rgba(255,255,255,0.1);
                padding-top: 20px;
            }
            #playlist {
                max-height: 250px;
            }
        }
    </style>
</head>
<body>
    <div class="player-container">
        
        <div class="player-section">
            <div class="cover-art">
                <img id="cover" src="images/default_cover.jpg" alt="專輯封面">
            </div>
            <h2 id="song-title">等待載入中...</h2>
            <h3 id="artist-name">--</h3>

            <audio id="audio" src=""></audio>

            <div class="progress-wrapper">
                <div class="progress-container">
                    <div id="progress" class="progress-bar"></div>
                </div>
                <div class="time-info">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="controls">
                <button id="prev" class="control-btn"><i class="fas fa-step-backward"></i></button>
                <button id="play" class="control-btn"><i class="fas fa-play"></i></button>
                <button id="next" class="control-btn"><i class="fas fa-step-forward"></i></button>
            </div>

            <div class="volume-control">
                <i class="fas fa-volume-down"></i>
                <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1">
                <i class="fas fa-volume-up"></i>
            </div>
        </div>

        <div class="playlist-section">
            <h3>接下來播放</h3>
            <ul id="playlist">
                </ul>
        </div>

    </div>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('play');
        const prevBtn = document.getElementById('prev');
        const nextBtn = document.getElementById('next');
        const songTitle = document.getElementById('song-title');
        const artistName = document.getElementById('artist-name');
        const coverArt = document.getElementById('cover');
        const progressContainer = document.querySelector('.progress-container');
        const progressBar = document.getElementById('progress');
        const currentTimeSpan = document.getElementById('current-time');
        const durationSpan = document.getElementById('duration');
        const volumeSlider = document.getElementById('volume-slider');
        const playlistUl = document.getElementById('playlist');

        let isPlaying = false;
        let songIndex = 0;
        let songs = [];

        // 讀取音樂資料
        fetch('music_data.json')
            .then(response => response.json())
            .then(data => {
                songs = data;
                if(songs.length > 0) {
                    loadSong(songs[songIndex]);
                    loadPlaylist();
                }
            })
            .catch(error => {
                console.error('Error loading songs:', error);
                songTitle.textContent = "無法載入音樂資料";
            });

        // 載入歌曲資訊
        function loadSong(song) {
            if(!song) return;
            songTitle.textContent = song.title;
            artistName.textContent = song.artist;
            audio.src = song.src;
            coverArt.src = song.cover;
            updatePlaylistActiveSong();
        }

        // 播放/暫停
        function playSong() {
            isPlaying = true;
            audio.play();
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }

        function pauseSong() {
            isPlaying = false;
            audio.pause();
            playBtn.innerHTML = '<i class="fas fa-play"></i>';
        }

        // 切換播放/暫停
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                pauseSong();
            } else {
                playSong();
            }
        });

        // 上一首
        prevBtn.addEventListener('click', () => {
            if(songs.length === 0) return;
            songIndex--;
            if (songIndex < 0) {
                songIndex = songs.length - 1;
            }
            loadSong(songs[songIndex]);
            playSong();
        });

        // 下一首
        nextBtn.addEventListener('click', () => {
            if(songs.length === 0) return;
            songIndex++;
            if (songIndex > songs.length - 1) {
                songIndex = 0;
            }
            loadSong(songs[songIndex]);
            playSong();
        });

        // 更新進度條
        audio.addEventListener('timeupdate', (e) => {
            const { duration, currentTime } = e.target;
            if (isNaN(duration)) return; // 避免初始載入時出現 NaN

            const progressPercent = (currentTime / duration) * 100;
            progressBar.style.width = `${progressPercent}%`;

            // 更新時間顯示
            const formatTime = (time) => {
                const minutes = Math.floor(time / 60);
                const seconds = Math.floor(time % 60);
                return `${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
            };

            currentTimeSpan.textContent = formatTime(currentTime);
            durationSpan.textContent = formatTime(duration);
        });

        // 點擊進度條跳轉
        progressContainer.addEventListener('click', (e) => {
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audio.duration;
            if(!isNaN(duration)) {
                audio.currentTime = (clickX / width) * duration;
            }
        });

        // 歌曲結束自動播放下一首
        audio.addEventListener('ended', () => {
            nextBtn.click();
        });

        // 音量控制
        volumeSlider.addEventListener('input', (e) => {
            audio.volume = e.target.value;
        });

        // 載入播放列表
        function loadPlaylist() {
            playlistUl.innerHTML = ''; // 清空現有清單
            songs.forEach((song, index) => {
                const li = document.createElement('li');
                
                // 為了排版更好看，將標題和歌手分開
                const titleSpan = document.createElement('span');
                titleSpan.className = 'li-title';
                titleSpan.textContent = song.title;

                const artistSpan = document.createElement('span');
                artistSpan.className = 'li-artist';
                artistSpan.textContent = song.artist;

                li.appendChild(titleSpan);
                li.appendChild(artistSpan);

                li.setAttribute('data-index', index);
                li.addEventListener('click', () => {
                    songIndex = index;
                    loadSong(songs[songIndex]);
                    playSong();
                });
                playlistUl.appendChild(li);
            });
            updatePlaylistActiveSong();
        }

        // 更新播放列表中當前歌曲的樣式
        function updatePlaylistActiveSong() {
            const playlistItems = document.querySelectorAll('#playlist li');
            playlistItems.forEach((item, index) => {
                if (index === songIndex) {
                    item.classList.add('active-song');
                } else {
                    item.classList.remove('active-song');
                }
            });
        }
    </script>
</body>
</html>
